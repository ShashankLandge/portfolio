<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>Shark Swimming Through Clouds</title>
    <style>
        @font-face {
            font-family: 'Khand';
            src: url('https://cdn.glitch.global/07bb69db-5f7c-4560-90f9-f83b73060c0b/Khand-Regular.ttf?v=1750623448034') format('truetype');
            font-weight: normal;
            font-style: normal;
        }

        @font-face {
            font-family: 'JetBrains_Mono';
            src: url('https://cdn.glitch.global/07bb69db-5f7c-4560-90f9-f83b73060c0b/JetBrainsMono-Regular.ttf?v=1750623439122') format('truetype');
            font-weight: normal;
            font-style: normal;
        }

        html, body {
            margin: 0;
            padding: 0;
            overflow: hidden;
            height: 100%;
            cursor: none;
            -webkit-touch-callout: none;
            -webkit-user-select: none;
            -moz-user-select: none;
            -ms-user-select: none;
            user-select: none;
        }

        canvas {
            position: absolute;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            display: block;
            pointer-events: none;
            touch-action: none;
        }

        #cloudCanvas {
            z-index: 0;
        }

        #sharkCanvas {
            z-index: 1;
            pointer-events: auto; /* Allow touch interaction */
        }

        /* Desktop Layout */
        .frame {
            position: fixed;
            top: 0;
            left: 0;
            width: calc(100vw - 80px);
            height: calc(100vh - 80px);
            margin: 40px;
            box-sizing: border-box;
            padding: 20px;
            border: 1px solid rgba(255, 255, 255, 0.6);
            pointer-events: none;
            font-family: 'Courier New', monospace;
            color: white;
            z-index: 2;
        }

        .frame-left {
            position: absolute;
            top: 40px;
            left: 40px;
            text-align: left;
        }

        .frame-bottom-right {
            position: absolute;
            right: 40px;
            bottom: 40px;
            text-align: right;
            font-family: "JetBrains_Mono", serif;
            font-size: 1.2rem;
            font-weight: normal;
            max-width: 200px;
            opacity: 0.7;
            line-height: 1.4;
        }

        .name {
            font-size: 2.1rem;
            font-weight: normal;
            margin-bottom: 0.6rem;
            pointer-events: auto;
            position: relative;
            height: 2rem;
            overflow: visible;
        }

        .name-text {
            position: absolute;
            top: 0;
            left: 0;
            transition: opacity 0.1s ease;
            white-space: nowrap;
        }

        .name-english {
            font-family: "JetBrains_Mono", serif;
            opacity: 1;
        }

        .name-marathi {
            font-family: 'Khand', sans-serif;
            opacity: 0;
            font-size: 2.1rem;
        }

        .title {
            font-family: "JetBrains_Mono", serif;
            font-size: 0.9rem;
            color: rgba(255, 255, 255, 0.7);
            margin-bottom: 2.1rem;
            letter-spacing: 0.5px;
        }

        .glitch {
            animation: glitch 0.3s ease-in-out;
        }

        @keyframes glitch {
            0% { opacity: 1; transform: translateX(0); }
            10% { opacity: 0.8; transform: translateX(-2px); }
            20% { opacity: 0.3; transform: translateX(2px); }
            30% { opacity: 0.9; transform: translateX(-1px); }
            40% { opacity: 0.1; transform: translateX(1px); }
            50% { opacity: 0.7; transform: translateX(-2px); }
            60% { opacity: 0.2; transform: translateX(2px); }
            70% { opacity: 0.9; transform: translateX(-1px); }
            80% { opacity: 0.4; transform: translateX(1px); }
            90% { opacity: 0.8; transform: translateX(0); }
            100% { opacity: 0; transform: translateX(0); }
        }

        .menu {
            display: flex;
            flex-direction: column;
            gap: 0.6rem; /* Ensures consistent spacing between links */
            pointer-events: auto;
        }

        .menu a {
            display: inline-block; /* Prevents vertical overlap */
            padding: 0.2rem 0.4rem; /* Slight padding for tap-friendly hitboxes */
            text-decoration: none;
            color: white;
            font-family: "JetBrains_Mono", serif;
            font-size: 1.2rem;
            font-weight: normal;
            opacity: 0.8;
            transition: opacity 0.2s;
        }

        .menu a.current {
            font-size: 1.5rem;
            line-height: 1.5rem; /* Match to font-size to avoid box overflow */
            position: relative;
        }

        .menu a:hover {
            opacity: 1;
        }

        .menu a {
            outline: 1px dashed rgba(255, 255, 255, 0.3); /* Debug only */
        }



        .frame a, .name {
            pointer-events: auto;
        }

        body, button, a, canvas {
            cursor: none !important;
        }


        /* Mobile Layout */
        @media (max-width: 768px) {
            html, body {
                cursor: auto;
            }

            body, button, a, canvas {
                cursor: auto !important;
            }

            .frame {
                width: calc(100vw - 40px);
                height: calc(100vh - 40px);
                margin: 20px;
                padding: 15px;
            }

            .frame-left {
                top: 20px;
                left: 20px;
            }

            .frame-bottom-right {
                right: 20px;
                bottom: 20px;
                font-size: 1rem;
                max-width: 150px;
                line-height: 1.3;
            }

            .name {
                font-size: 1.8rem;
                margin-bottom: 0.4rem;
                height: 1.8rem;
            }

            .name-marathi {
                font-size: 1.8rem;
            }

            .title {
                font-size: 0.8rem;
                margin-bottom: 1.5rem;
            }

            .menu a {
                font-size: 1.1rem;
                margin-bottom: 0.4rem;
            }

            .menu a.current {
                font-size: 1.3rem;
            }
        }

        @media (max-width: 480px) {
            .frame {
                width: calc(100vw - 30px);
                height: calc(100vh - 30px);
                margin: 15px;
                padding: 12px;
            }

            .frame-left {
                top: 15px;
                left: 15px;
            }

            .frame-bottom-right {
                right: 15px;
                bottom: 15px;
                font-size: 0.9rem;
                max-width: 120px;
            }

            .name {
                font-size: 1.6rem;
                height: 1.6rem;
            }

            .name-marathi {
                font-size: 1.6rem;
            }

            .title {
                font-size: 0.75rem;
                margin-bottom: 1.2rem;
            }

            .menu a {
                font-size: 1rem;
            }

            .menu a.current {
                font-size: 1.2rem;
            }
        }
    </style>
</head>
<body>
    <canvas id="cloudCanvas"></canvas>
    <canvas id="sharkCanvas"></canvas>

    <div class="frame">
        <div class="frame-left">
            <div class="name">
                <div class="name-text name-english" id="englishName">Shashank Landge</div>
                <div class="name-text name-marathi" id="marathiName">शशांक लांडगे</div>
            </div>
            <div class="title">Engineer.</div>
            <nav class="menu">
                <a href="cloud_parting.html" class="current">.</a>
                <a href="dual_shark.html">Projects</a>
                <a href="single_shark.html">Contact</a>
            </nav>
        </div>
        <div class="frame-bottom-right">
            <p>
                Born in 2003<br />
                in Maharashtra, India.<br />
                I explore logic,<br />
                code, and learning.<br />
                Pursuing clarity<br />
                through algorithms,<br />
                and simplicity.
            </p>
        </div>
    </div>

    <script src="src/js/cloud_parting.js"></script>
    <script>
        // Start glitch on English
        englishName.classList.add("glitch");

        // Switch to Marathi after glitch
        setTimeout(() => {
            englishName.style.opacity = "0";
            marathiName.style.opacity = "1";
            englishName.classList.remove("glitch");

            // Start glitch on Marathi
            marathiName.classList.add("glitch");
        }, 300);

        // Remove glitch from Marathi after it's shown
        setTimeout(() => {
            marathiName.classList.remove("glitch");
        }, 600); // Optional, can be same as glitch duration

        // Switch back to English after 2 seconds
        setTimeout(() => {
            marathiName.style.opacity = "0";
            englishName.style.opacity = "1";

            // Optional: glitch English again when returning
            englishName.classList.add("glitch");
            setTimeout(() => {
                englishName.classList.remove("glitch");
            }, 300);
        }, 3300);

        // Start the first flicker after page load
        setTimeout(flickerEffect, 2000);

        // Repeat the effect every 8 seconds
        setInterval(flickerEffect, 12000);
    </script>
</body>
</html>
