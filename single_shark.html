<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Shark Cursor</title>
    <style>
      @font-face {
        font-family: "NType82";
        src: url("assets/NType82-Regular.otf") format("opentype");
        font-weight: normal;
        font-style: normal;
      }

      @font-face {
        font-family: "NType82-Headline";
        src: url("assets/NType82-Headline.otf") format("opentype");
        font-weight: bold;
        font-style: normal;
      }

      @font-face {
        font-family: "NType82Mono";
        src: url("assets/NType82Mono-Regular.otf") format("opentype");
        font-weight: normal;
        font-style: normal;
      }

      html,
      body {
        margin: 0;
        padding: 0;
        background: black;
        overflow: hidden;
        height: 100%;
      }
      canvas {
        display: block;
      }

      .frame {
        position: fixed;
        top: 0;
        left: 0;
        width: calc(100vw - 80px);
        height: calc(100vh - 80px);
        margin: 40px;
        box-sizing: border-box;
        padding: 20px;
        border: 1px solid rgba(255, 255, 255, 0.6);
        pointer-events: none;
        font-family: "NType82Mono", monospace;
        color: white;
      }

      .frame-left {
        position: absolute;
        top: 40px;
        left: 40px;
        text-align: left;
      }

      .contact-links-container {
        position: absolute;
        right: 40px;
        bottom: 40px;
        text-align: right;
        font-family: "NType82Mono", monospace;
        font-size: 1.2rem;
        font-weight: normal;
        max-width: 200px;
        opacity: 0.7;
        line-height: 1.4;
      }

      .contact-link {
        display: block;
        margin-bottom: 0.7rem;
        text-decoration: none;
        color: white;
        font-family: "NType82Mono", monospace;
        font-size: 1.2rem;
        opacity: 0.8;
        transition: opacity 0.3s, transform 0.2s;
        pointer-events: auto;
      }

      .contact-link:hover {
        opacity: 1;
        transform: translateX(-3px);
      }

      .name {
        font-size: 2.1rem;
        font-weight: normal;
        margin-bottom: 0.6rem;
        pointer-events: auto;
        position: relative;
        height: 2rem;
        overflow: visible;
      }

      .name-text {
        position: absolute;
        top: 0;
        left: 0;
        transition: opacity 0.1s ease;
        white-space: nowrap;
      }

      .name-english {
        font-family: "NType82Mono", monospace;
        opacity: 1;
      }

      .name-marathi {
        font-family: "NType82-Headline", sans-serif;
        opacity: 0;
        font-size: 2.1rem;
      }

      .title {
        font-family: "NType82Mono", monospace;
        font-size: 0.9rem;
        color: rgba(255, 255, 255, 0.7);
        margin-bottom: 2.1rem;
        letter-spacing: 0.5px;
      }

      .glitch {
        animation: glitch 0.3s ease-in-out;
      }

      @keyframes glitch {
        0% {
          opacity: 1;
          transform: translateX(0);
        }
        10% {
          opacity: 0.8;
          transform: translateX(-2px);
        }
        20% {
          opacity: 0.3;
          transform: translateX(2px);
        }
        30% {
          opacity: 0.9;
          transform: translateX(-1px);
        }
        40% {
          opacity: 0.1;
          transform: translateX(1px);
        }
        50% {
          opacity: 0.7;
          transform: translateX(-2px);
        }
        60% {
          opacity: 0.2;
          transform: translateX(2px);
        }
        70% {
          opacity: 0.9;
          transform: translateX(-1px);
        }
        80% {
          opacity: 0.4;
          transform: translateX(1px);
        }
        90% {
          opacity: 0.8;
          transform: translateX(0);
        }
        100% {
          opacity: 0;
          transform: translateX(0);
        }
      }

      .menu a {
        text-decoration: none;
        color: white;
        font-family: "NType82Mono", monospace;
        font-size: 1.2rem;
        margin-bottom: 0.5rem;
        display: block;
        width: fit-content;
        opacity: 0.6;
        transition: opacity 0.3s;
        pointer-events: auto;
      }

      .menu a.current {
        font-size: 1.5rem;
        line-height: 1rem;
        position: relative;
      }

      .menu a:hover {
        opacity: 1;
      }

      /* Mobile Layout */
      @media (max-width: 768px) {
        html,
        body {
          cursor: auto;
          position: fixed;
          overflow: hidden;
        }

        body,
        button,
        a,
        canvas {
          cursor: auto !important;
        }

        .frame {
          width: calc(100vw - 20px);
          height: calc(100vh - 20px);
          margin: 10px;
          padding: 15px;
          padding-top: max(15px, env(safe-area-inset-top));
          padding-bottom: max(15px, env(safe-area-inset-bottom));
          padding-left: max(15px, env(safe-area-inset-left));
          padding-right: max(15px, env(safe-area-inset-right));
        }

        .frame-left {
          top: max(10px, env(safe-area-inset-top));
          left: max(10px, env(safe-area-inset-left));
        }

        .contact-links-container {
          right: max(10px, env(safe-area-inset-right));
          bottom: max(10px, env(safe-area-inset-bottom));
          font-size: 0.95rem;
          max-width: 160px;
          line-height: 1.3;
        }

        .name {
          font-size: 1.7rem;
          margin-bottom: 0.4rem;
          height: 1.7rem;
        }

        .name-marathi {
          font-size: 1.7rem;
        }

        .title {
          font-size: 0.8rem;
          margin-bottom: 1.4rem;
        }

        .menu a {
          font-size: 1.05rem;
          margin-bottom: 0.4rem;
          padding: 0.3rem 0.5rem;
          margin: 0.1rem 0;
        }

        .menu a.current {
          font-size: 1.25rem;
        }
      }

      @media (max-width: 480px) {
        .frame {
          width: calc(100vw - 16px);
          height: calc(100vh - 16px);
          margin: 8px;
          padding: 12px;
          padding-top: max(12px, env(safe-area-inset-top));
          padding-bottom: max(12px, env(safe-area-inset-bottom));
          padding-left: max(12px, env(safe-area-inset-left));
          padding-right: max(12px, env(safe-area-inset-right));
        }

        .frame-left {
          top: max(8px, env(safe-area-inset-top));
          left: max(8px, env(safe-area-inset-left));
        }

        .contact-links-container {
          right: max(8px, env(safe-area-inset-right));
          bottom: max(8px, env(safe-area-inset-bottom));
          font-size: 0.9rem;
          max-width: 150px;
        }

        .contact-link {
          font-size: 0.9rem;
        }

        .name {
          font-size: 1.5rem;
          height: 1.5rem;
        }

        .name-marathi {
          font-size: 1.5rem;
        }

        .title {
          font-size: 0.7rem;
          margin-bottom: 1.1rem;
        }

        .menu a {
          font-size: 0.95rem;
          padding: 0.25rem 0.4rem;
        }

        .menu a.current {
          font-size: 1.1rem;
        }
      }
    </style>
  </head>

  <body>
    <canvas id="fishCanvas"></canvas>

    <div class="frame">
      <div class="frame-left">
        <div class="name">
          <div class="name-text name-english" id="englishName">
            Shashank Landge
          </div>
          <div class="name-text name-marathi" id="marathiName">
            शशांक लांडगे
          </div>
        </div>
        <div class="title">Engineer.</div>
        <nav class="menu">
          <a href="cloud_parting.html">Home</a>
          <a href="dual_shark.html">Projects</a>
          <a href="single_shark.html" class="current">.</a>
        </nav>
      </div>
      <div class="contact-links-container">
        <a href="mailto:your.email@example.com" class="contact-link">Email ↗</a>
        <a
          href="https://twitter.com/yourusername"
          class="contact-link"
          target="_blank"
          >Github ↗</a
        >
        <a
          href="https://instagram.com/yourusername"
          class="contact-link"
          target="_blank"
          >Leetcode ↗</a
        >
        <a
          href="https://linkedin.com/in/yourusername"
          class="contact-link"
          target="_blank"
          >LinkedIn ↗</a
        >
      </div>
    </div>

    <script>
      const englishName = document.getElementById("englishName");
      const marathiName = document.getElementById("marathiName");

      function flickerEffect() {
        // Start glitch on English
        englishName.classList.add("glitch");

        // Switch to Marathi after glitch
        setTimeout(() => {
          englishName.style.opacity = "0";
          marathiName.style.opacity = "1";
          englishName.classList.remove("glitch");

          // Start glitch on Marathi
          marathiName.classList.add("glitch");
        }, 300);

        // Remove glitch from Marathi after it's shown
        setTimeout(() => {
          marathiName.classList.remove("glitch");
        }, 600); // Optional, can be same as glitch duration

        // Switch back to English after 2 seconds
        setTimeout(() => {
          marathiName.style.opacity = "0";
          englishName.style.opacity = "1";

          // Optional: glitch English again when returning
          englishName.classList.add("glitch");
          setTimeout(() => {
            englishName.classList.remove("glitch");
          }, 300);
        }, 3300);
      }

      // Start the first flicker after page load
      setTimeout(flickerEffect, 2000);

      // Repeat the effect every 8 seconds
      setInterval(flickerEffect, 12000);
    </script>

    <script src="src/js/single_shark.js"></script>
  </body>
</html>
