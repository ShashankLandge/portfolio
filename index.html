<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Shark Swimming Through Clouds</title>
    <style>

/*         @font-face {
            font-family: 'EB_Garamond';
            src: url('src/assets/EB_Garamond/EB_Garamond/static/EBGaramond-Regular.ttf') format('truetype');
            font-weight: normal;
            font-style: normal;
        } */
        html, body {
            margin: 0;
            padding: 0;
            overflow: hidden;
            height: 100%;
            cursor: none;
        }

        canvas {
            position: absolute;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            display: block;
            pointer-events: none; /* Ensures canvas doesn't block UI */
        }

        #cloudCanvas {
            z-index: 0;
        }

        #sharkCanvas {
            z-index: 1;
        }

        .frame {
            position: fixed;
            top: 0;
            left: 0;
            width: calc(100vw - 80px);
            height: calc(100vh - 80px);
            margin: 40px;
            box-sizing: border-box;
            padding: 20px;
            border: 1px solid rgba(255, 255, 255, 0.6);
            pointer-events: none;
            font-family: 'Courier New', monospace;
            color: white;
            z-index: 2; /* Make sure it's above the canvases */
        }


        .frame-left {
            position: absolute;
            top: 40px;
            left: 40px;
            text-align: left;
        }

        .frame-bottom-right {
            position: absolute;
            right: 40px;
            bottom: 40px;
            text-align: right;
            font-family: "EB_Garamond", serif;
            font-size: 1.2rem;
            font-weight: normal;
            max-width: 200px;
            opacity: 0.7;
            line-height: 1.4;
        }


        .name {
            font-family: "EB_Garamond", serif;
            font-size: 2.1rem;
            font-weight: normal;
            margin-bottom: 1rem;
            pointer-events: auto;
        }

        .menu a {
            display: block;
            margin-bottom: 0.5rem;
            text-decoration: none;
            color: white;
            font-family: "EB_Garamond", serif;
            font-size: 1.2rem;
            font-weight: normal;
            opacity: 0.8;
            transition: opacity 0.2s;
            pointer-events: auto;
        }
        .menu a:hover {
            opacity: 1;
        }

        .frame a, .name {
            pointer-events: auto;
        }

        body, button, a, canvas {
            cursor: none !important;
        }
    </style>
</head>
<body>
    <canvas id="cloudCanvas"></canvas>
    <canvas id="sharkCanvas"></canvas>

    <div class="frame">
        <div class="frame-left">
            <div class="name">Shashank Landge</div>
            <nav class="menu">
                <a href="single_shark.html">Home</a>
                <a href="dual_shark.html">Projects</a>
                <a href="single_shark.html">Contact</a>
            </nav>
        </div>
        <div class="frame-bottom-right">
            <p>
                Born in 2003<br />
                in Maharashtra, India.<br />
                I explore logic,<br />
                code, and learning.<br />
                Pursuing clarity<br />
                through algorithms,<br />
                and simplicity.
            </p>
        </div>
    </div>

    <script src="src/js/cloud_parting.js"></script>
</body>
</html>
