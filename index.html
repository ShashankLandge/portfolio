<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Shashank | Intro</title>

    <style>
        @font-face {
          font-family: 'Khand';
          src: url('https://cdn.glitch.global/07bb69db-5f7c-4560-90f9-f83b73060c0b/Khand-Regular.ttf?v=1750623448034') format('truetype');
          font-weight: normal;
          font-style: normal;
        }

        @font-face {
          font-family: 'JetBrains_Mono';
          src: url('https://cdn.glitch.global/07bb69db-5f7c-4560-90f9-f83b73060c0b/JetBrainsMono-Regular.ttf?v=1750623439122') format('truetype');
          font-weight: normal;
          font-style: normal;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            background-color: #000000;
            overflow: hidden;
            font-family: 'JetBrains_Mono', monospace;
            cursor: none;
        }

        .intro {
            position: fixed;
            width: 100vw; height: 100vh;
            display: flex; align-items: center; justify-content: center;
            flex-direction: column;
            background-color: #000000;
            z-index: 1000;
        }

        canvas {
            position: absolute; top: 0; left: 0; z-index: 0;
        }

        .skill-word {
            font-size: 1.8rem;
            font-family: 'JetBrains_Mono', monospace;
            color: rgba(255, 255, 255, 0.7);
            position: absolute;
            z-index: 3;
            letter-spacing: 2px;
            opacity: 1;
            transform: translateY(80px) translateZ(0);
        }

        .name-reveal {
            font-size: 3.2rem;
            font-family: 'Khand', sans-serif;
            letter-spacing: 4px;
            color: white;
            opacity: 0;
            z-index: 1;
            text-shadow: 0 0 30px rgba(255, 255, 255, 0.6);
            transform: scale(1.1) translateZ(0);
            filter: blur(2px);
        }

        .main-content {
            display: none;
            padding: 4rem;
            text-align: center;
            color: white;
        }

        .frame {
          position: fixed;
          top: 0;
          left: 0;
          width: calc(100vw - 80px);
          height: calc(100vh - 80px);
          margin: 40px;
          box-sizing: border-box;
          padding: 20px;
          border: 1px solid rgba(255, 255, 255, 0.6);
          pointer-events: none;
          z-index: 2;
        }

        body, button, a, canvas {
          cursor: none !important;
        }
    </style>
</head>
<body>

<div class="intro">
    <canvas id="particles"></canvas>
    <div class="frame"></div>
    <div class="name-reveal" id="name">Shashank Landge</div>
    <div class="skill-word" id="word"></div>
</div>

<div class="main-content">
    <h1>Welcome to My Portfolio</h1>
    <p>This is the main content after the intro...</p>
</div>

<!-- GSAP -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>

<script src="src/js/intro.js"></script>
</body>
</html>
